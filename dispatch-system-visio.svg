<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980" role="img" aria-labelledby="title desc">
  <title id="title">调度系统技术路线 Visio 风格图</title>
  <desc id="desc">状态实时感知、冲突预测预警、动态滚动优化、分布式指令下发与闭环反馈的技术路线图。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 10,5 0,10z" fill="#1976d2"/></marker>
    <marker id="greenArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0,0 10,5 0,10z" fill="#43a047"/></marker>
    <linearGradient id="blue" x1="0" x2="1"><stop offset="0" stop-color="#eef7ff"/><stop offset="1" stop-color="#f9fcff"/></linearGradient>
    <linearGradient id="green" x1="0" x2="1"><stop offset="0" stop-color="#f0fbec"/><stop offset="1" stop-color="#fbfff8"/></linearGradient>
    <linearGradient id="orange" x1="0" x2="1"><stop offset="0" stop-color="#fff5eb"/><stop offset="1" stop-color="#fffdf8"/></linearGradient>
    <style>
      .title{font:700 30px 'Microsoft YaHei',Arial,sans-serif;fill:#0b2d5c;letter-spacing:2px}.h{font:700 21px 'Microsoft YaHei',Arial,sans-serif}.t{font:16px 'Microsoft YaHei',Arial,sans-serif;fill:#111}.s{font:14px 'Microsoft YaHei',Arial,sans-serif;fill:#111}.xs{font:12px 'Microsoft YaHei',Arial,sans-serif;fill:#333}.box{stroke-width:1.5;rx:9;ry:9}.bblue{fill:url(#blue);stroke:#2c75c9}.bgreen{fill:url(#green);stroke:#60a84d}.borange{fill:url(#orange);stroke:#f07d22}.bdash{fill:none;stroke:#1976d2;stroke-width:2;stroke-dasharray:8 8;rx:18;ry:18}.arrow{stroke:#1976d2;stroke-width:6;fill:none;marker-end:url(#arrow)}.garr{stroke:#43a047;stroke-width:6;fill:none;marker-end:url(#greenArrow)}.thin{stroke:#1976d2;stroke-width:2;fill:none;marker-end:url(#arrow)}.dash{stroke:#1976d2;stroke-width:2;stroke-dasharray:5 5;fill:none}.redDash{stroke:#e53935;stroke-width:2;stroke-dasharray:6 5;fill:none}.num{font:700 20px Arial,sans-serif;fill:white}.step1{fill:#1565c0}.step2{fill:#2e7d32}.step3{fill:#ef6c00}.step4{fill:#1565c0}.icon{font:34px 'Segoe UI Emoji','Apple Color Emoji',sans-serif}.center{text-anchor:middle}.right{text-anchor:end}
    </style>
  </defs>

  <text x="900" y="42" text-anchor="middle" class="title">调度系统技术路线： 状态实时感知  —  冲突预测预警  —  动态滚动优化  —  分布式指令下发</text>

  <!-- step headers -->
  <rect x="30" y="75" width="360" height="105" class="box bblue"/><circle cx="122" cy="99" r="18" class="step1"/><text x="122" y="106" text-anchor="middle" class="num">1</text><text x="145" y="106" class="h" fill="#0d47a1">状态实时感知</text><text x="210" y="140" text-anchor="middle" class="t">实时接收外部数据，获取全场</text><text x="210" y="164" text-anchor="middle" class="t">无人异构设备的坐标</text>
  <rect x="450" y="75" width="345" height="105" class="box bgreen"/><circle cx="545" cy="99" r="18" class="step2"/><text x="545" y="106" text-anchor="middle" class="num">2</text><text x="568" y="106" class="h" fill="#1b5e20">冲突预测预警</text><text x="622" y="140" text-anchor="middle" class="t">时空网络建模，识别“人-车-机”</text><text x="622" y="164" text-anchor="middle" class="t">空间占位冲突</text>
  <rect x="855" y="75" width="365" height="105" class="box borange"/><circle cx="945" cy="99" r="18" class="step3"/><text x="945" y="106" text-anchor="middle" class="num">3</text><text x="970" y="106" class="h" fill="#e65100">动态滚动优化</text><text x="1037" y="140" text-anchor="middle" class="t">局部重调度求解，仅调整受干扰的</text><text x="1037" y="164" text-anchor="middle" class="t">局部链路，快速生成新指令</text>
  <rect x="1280" y="75" width="350" height="105" class="box bblue"/><circle cx="1375" cy="99" r="18" class="step4"/><text x="1375" y="106" text-anchor="middle" class="num">4</text><text x="1400" y="106" class="h" fill="#0d47a1">分布式指令下发</text><text x="1455" y="140" text-anchor="middle" class="t">新指令通过数据链路同步至各执行端，</text><text x="1455" y="164" text-anchor="middle" class="t">执行闭环控制</text>
  <path d="M390 128h50" class="arrow"/><path d="M795 128h50" class="arrow"/><path d="M1220 128h50" class="arrow"/>

  <!-- left data and fusion -->
  <rect x="30" y="200" width="140" height="505" class="box bblue"/><text x="100" y="226" class="h center" fill="#0d47a1">外部数据来源</text><text x="70" y="285" class="icon center">🛰️</text><path d="M115 285h42v125" class="thin"/><text x="100" y="318" class="s center">卫星定位</text><text x="100" y="338" class="xs center">(高精度/降级)</text><text x="70" y="405" class="icon center">📡</text><text x="100" y="442" class="s center">雷达感知</text><text x="70" y="520" class="icon center">📷</text><text x="100" y="558" class="s center">视觉识别</text><text x="70" y="635" class="icon center">📶</text><text x="100" y="673" class="s center">物联网设备</text><text x="100" y="695" class="s center">...</text>
  <rect x="200" y="200" width="195" height="138" class="box bblue"/><text x="298" y="228" class="h center" fill="#0d47a1">数据接入与融合</text><rect x="210" y="250" width="175" height="82" class="box" fill="#fff" stroke="#7aa7dc"/><text x="260" y="304" class="icon center">☁️</text><text x="318" y="280" class="s">• 数据清洗</text><text x="318" y="303" class="s">• 坐标转换</text><text x="318" y="326" class="s">• 时间同步</text><text x="318" y="349" class="s">• 状态融合</text>
  <rect x="200" y="380" width="195" height="385" class="box bblue"/><text x="298" y="410" class="h center" fill="#0d47a1">全场设备状态</text><rect x="210" y="430" width="175" height="200" fill="#fff" stroke="#b5cbe8"/><path d="M230 430v200M270 430v200M310 430v200M350 430v200M210 470h175M210 510h175M210 550h175M210 590h175" stroke="#d8e4f2"/><text x="250" y="515" class="icon center">🚙</text><text x="315" y="490" class="icon center">🛸</text><text x="330" y="560" class="icon center">🚜</text><text x="365" y="600" class="icon center">⛴️</text><text x="290" y="575" class="icon center">📍</text><text x="235" y="604" class="icon center">🚜</text><text x="360" y="520" class="icon center">📍</text><text x="250" y="472" class="icon center">🚶</text><text x="215" y="672" class="xs">输出：设备ID、类型、坐标</text><text x="245" y="695" class="xs">(x,y,z)、速度、航向、</text><text x="245" y="718" class="xs">时间戳、定位状态等</text>
  <path d="M170 445h22" class="arrow"/><path d="M298 338v35" class="arrow"/><path d="M395 532h44" class="arrow"/>

  <!-- prediction -->
  <rect x="450" y="200" width="345" height="565" class="box bgreen"/><text x="622" y="228" class="h center" fill="#1b5e20">时空网络建模</text><g transform="translate(505 250)"><path d="M10 70h260l-45 52H-35zM10 130h260l-45 52H-35zM10 190h260l-45 52H-35z" fill="none" stroke="#7b9e7b"/><path d="M10 70 10 190M92 70 92 190M178 70 178 190M270 70 270 190" stroke="#9bbf9b"/><path d="M92 82 150 100 198 92 245 82" class="dash"/><path d="M40 135 92 154 150 136 198 154 245 134" stroke="#43a047" stroke-width="2" fill="none"/><path d="M40 205 92 196 150 224 198 206 245 226" stroke="#8e44ad" stroke-width="2" stroke-dasharray="5 4" fill="none"/><path d="M40 165 92 162 150 146 198 168 245 160" stroke="#fb8c00" stroke-width="2" stroke-dasharray="5 4" fill="none"/><g fill="#2c75c9"><circle cx="40" cy="82" r="6"/><circle cx="92" cy="82" r="6"/><circle cx="150" cy="100" r="6"/><circle cx="198" cy="92" r="6"/><circle cx="245" cy="82" r="6"/></g><g fill="#43a047"><circle cx="40" cy="135" r="6"/><circle cx="198" cy="154" r="6"/><circle cx="245" cy="134" r="6"/></g><g fill="#fb8c00"><circle cx="40" cy="165" r="6"/><circle cx="92" cy="162" r="6"/><circle cx="150" cy="146" r="6"/><circle cx="198" cy="168" r="6"/><circle cx="245" cy="160" r="6"/></g><g fill="#8e44ad"><circle cx="40" cy="205" r="6"/><circle cx="92" cy="196" r="6"/><circle cx="150" cy="224" r="6"/><circle cx="198" cy="206" r="6"/><circle cx="245" cy="226" r="6"/></g><text x="-58" y="86" class="s">t</text><text x="-63" y="145" class="s">t+1</text><text x="-65" y="213" class="s">t+n</text></g>
  <rect x="465" y="476" width="315" height="140" class="box bgreen"/><text x="622" y="505" class="h center" fill="#1b5e20">冲突识别引擎</text><text x="515" y="575" class="icon center">🧠</text><text x="585" y="545" class="s">• 轨迹预测</text><text x="585" y="570" class="s">• 占位分析</text><text x="585" y="595" class="s">• 冲突检测</text><text x="585" y="620" class="s">• 风险评估</text>
  <rect x="465" y="635" width="315" height="112" class="box" fill="#fff8f6" stroke="#e53935"/><text x="622" y="660" class="h center" fill="#d32f2f">冲突预警</text><text x="520" y="715" class="icon center">⚠️</text><text x="585" y="687" class="s">• 冲突类型：人-车 | 人-机 | 车-机</text><text x="585" y="710" class="s">• 冲突位置：(x,y)</text><text x="585" y="733" class="s">• 发生时间：t + Δt</text><text x="585" y="756" class="s">• 风险等级：高 / 中 / 低</text>

  <!-- optimization -->
  <path d="M795 478h50" class="garr"/><rect x="855" y="200" width="365" height="138" class="box borange"/><text x="1037" y="228" class="h center" fill="#e65100">事件捕获与影响分析</text><text x="900" y="288" class="icon center">⚡</text><text x="940" y="270" class="s">• 捕获动态事件（定位降级、速度波动等）</text><text x="940" y="296" class="s">• 影响范围分析</text><text x="940" y="322" class="s">• 锁定未受影响的基准作业调度</text><path d="M1037 338v30" stroke="#f4a261" stroke-width="6" fill="none" marker-end="url(#arrow)"/>
  <rect x="855" y="365" width="365" height="395" fill="#fffaf5" stroke="#f07d22" stroke-width="2" stroke-dasharray="8 6" rx="12"/><text x="1037" y="392" class="h center" fill="#e65100">局部重调度求解</text><rect x="865" y="410" width="184" height="160" class="box borange"/><text x="957" y="436" class="s center" fill="#e65100" font-weight="700">局部子图提取</text><g transform="translate(885 455)" fill="none" stroke="#8798a5" stroke-width="2"><circle cx="15" cy="0" r="8"/><circle cx="75" cy="0" r="8"/><circle cx="45" cy="45" r="8"/><circle cx="105" cy="28" r="8"/><circle cx="135" cy="58" r="8"/><path d="M23 4l44 0M22 6l18 33M82 3l17 18M52 43l47-12M112 33l18 18"/><circle cx="62" cy="80" r="8" fill="#ff7043"/><circle cx="100" cy="92" r="8" fill="#ff7043"/><circle cx="140" cy="82" r="8" fill="#29b6f6"/><circle cx="118" cy="55" r="8" fill="#fb8c00"/><ellipse cx="105" cy="73" rx="60" ry="33" class="redDash"/></g><rect x="1075" y="410" width="135" height="160" class="box borange"/><text x="1142" y="436" class="s center" fill="#e65100" font-weight="700">启发式优化算法</text><text x="1100" y="492" class="icon center">⚙️</text><text x="1138" y="474" class="s">• 禁忌搜索</text><text x="1138" y="497" class="s">• 遗传算法</text><text x="1138" y="520" class="s">• 模拟退火</text><text x="1138" y="543" class="s">• 邻域搜索</text><path d="M1049 490h18" class="thin"/><path d="M957 570v35" class="thin"/><rect x="865" y="604" width="345" height="130" class="box borange"/><text x="1037" y="630" class="h center" fill="#e65100">新指令生成（数百毫秒内）</text><text x="912" y="693" class="icon center">🏎️</text><text x="975" y="663" class="s">• 路径调整</text><text x="975" y="687" class="s">• 时序调整</text><text x="975" y="711" class="s">• 速度调整</text><text x="975" y="735" class="s">• 作业重分配</text>

  <!-- dispatch -->
  <path d="M1220 478h50" class="arrow"/><rect x="1280" y="200" width="350" height="248" class="box bblue"/><text x="1455" y="228" class="h center" fill="#0d47a1">指令下发</text><text x="1425" y="317" class="icon center">📡</text><path d="M1425 325 1325 405M1425 325 1390 405M1425 325 1455 405M1425 325 1515 405M1425 325 1580 405" class="dash"/><text x="1325" y="430" class="icon center">🚙</text><text x="1390" y="430" class="icon center">🚗</text><text x="1455" y="430" class="icon center">🚜</text><text x="1515" y="430" class="icon center">🛸</text><text x="1580" y="430" class="icon center">🚶</text><text x="1535" y="270" class="s">• 指令封装</text><text x="1535" y="295" class="s">• 加密传输</text><text x="1535" y="320" class="s">• 可靠投递</text><text x="1535" y="345" class="s">• 状态确认</text>
  <path d="M1455 448v35" class="arrow"/><rect x="1280" y="482" width="350" height="124" class="box bblue"/><text x="1455" y="512" class="h center" fill="#0d47a1">执行端接收与执行</text><text x="1322" y="565" class="icon center">🚙</text><text x="1390" y="565" class="icon center">🚜</text><text x="1460" y="565" class="icon center">🛸</text><text x="1530" y="565" class="icon center">🚶</text><text x="1574" y="542" class="s">• 指令解析</text><text x="1574" y="567" class="s">• 路径跟踪</text><text x="1574" y="592" class="s">• 任务执行</text><text x="1574" y="617" class="s">• 状态上报</text>
  <path d="M1455 606v35" class="arrow"/><rect x="1280" y="636" width="350" height="128" class="box bblue"/><text x="1455" y="666" class="h center" fill="#0d47a1">执行状态监控</text><text x="1330" y="720" class="icon center">📈</text><text x="1515" y="692" class="s">• 执行偏差监控</text><text x="1515" y="717" class="s">• 定位持续跟踪</text><text x="1515" y="742" class="s">• 异常检测</text><text x="1515" y="767" class="s">• 状态反馈</text>

  <!-- feedback -->
  <rect x="175" y="797" width="1330" height="150" class="bdash"/><text x="840" y="792" class="h center" fill="#0d47a1">闭环反馈</text><text x="840" y="815" class="s center">形成全闭环控制</text><rect x="218" y="827" width="235" height="96" class="box bblue"/><text x="335" y="852" class="s center" fill="#0d47a1" font-weight="700">偏差监测</text><text x="270" y="895" class="icon center">⊕</text><text x="323" y="875" class="s">• 轨迹偏差</text><text x="323" y="898" class="s">• 时序偏差</text><text x="323" y="921" class="s">• 速度偏差</text><path d="M453 875h70" class="thin"/><rect x="555" y="827" width="235" height="96" class="box bblue"/><text x="672" y="852" class="s center" fill="#0d47a1" font-weight="700">反馈上报</text><text x="615" y="895" class="icon center">☁️</text><text x="670" y="875" class="s">• 执行状态上报</text><text x="670" y="898" class="s">• 偏差信息上报</text><text x="670" y="921" class="s">• 异常事件上报</text><path d="M790 875h70" class="thin"/><rect x="922" y="827" width="235" height="96" class="box bblue"/><text x="1039" y="852" class="s center" fill="#0d47a1" font-weight="700">模型更新</text><text x="977" y="895" class="icon center">🧠</text><text x="1032" y="875" class="s">• 预测模型更新</text><text x="1032" y="898" class="s">• 参数自适应</text><text x="1032" y="921" class="s">• 规则库更新</text><path d="M1157 875h70" class="thin"/><rect x="1250" y="827" width="235" height="96" class="box bblue"/><text x="1367" y="852" class="s center" fill="#0d47a1" font-weight="700">调度迭代</text><text x="1305" y="895" class="icon center">🔄</text><text x="1360" y="875" class="s">• 滚动时域推进</text><text x="1360" y="898" class="s">• 新一轮调度</text><text x="1360" y="921" class="s">• 持续优化</text><path d="M1455 764v55h50" class="thin"/><path d="M175 872h-76V705" class="thin"/><path d="M100 705V732h-2V874h77" stroke="#1976d2" stroke-width="3" fill="none"/>

  <!-- legend -->
  <rect x="1675" y="75" width="95" height="855" class="box bblue"/><text x="1722" y="105" class="s center" fill="#0b2d5c" font-weight="700">图例说明</text><line x1="1675" x2="1770" y1="121" y2="121" stroke="#a8c2e8"/><text x="1722" y="150" class="s center" font-weight="700">设备类型</text><text x="1693" y="195" class="icon center">🚙</text><text x="1735" y="198" class="s">无人车</text><text x="1693" y="245" class="icon center">🛸</text><text x="1735" y="248" class="s">无人机</text><text x="1693" y="295" class="icon center">🚜</text><text x="1735" y="298" class="s">机具设备</text><text x="1693" y="345" class="icon center">⛴️</text><text x="1735" y="348" class="s">无人船</text><text x="1693" y="395" class="icon center">🚶</text><text x="1735" y="398" class="s">人员</text><line x1="1685" x2="1760" y1="430" y2="430" stroke="#a8c2e8"/><text x="1722" y="460" class="s center" font-weight="700">线型说明</text><line x1="1690" x2="1732" y1="490" y2="490" stroke="#222" stroke-width="3"/><text x="1738" y="495" class="xs">实际轨迹</text><line x1="1690" x2="1732" y1="520" y2="520" stroke="#222" stroke-dasharray="6 5" stroke-width="2"/><text x="1738" y="525" class="xs">预测轨迹</text><line x1="1690" x2="1732" y1="550" y2="550" stroke="#1976d2" stroke-dasharray="4 4" stroke-width="2"/><text x="1738" y="555" class="xs">通信链路</text><line x1="1690" x2="1732" y1="580" y2="580" stroke="#e53935" stroke-dasharray="6 5" stroke-width="2"/><text x="1738" y="585" class="xs">冲突关系</text><line x1="1685" x2="1760" y1="612" y2="612" stroke="#a8c2e8"/><text x="1722" y="642" class="s center" font-weight="700">状态说明</text><text x="1695" y="680" class="icon center">📍</text><text x="1735" y="682" class="xs">定位正常</text><text x="1695" y="725" class="icon center">📍</text><text x="1735" y="727" class="xs">定位降级</text><text x="1695" y="770" class="icon center">📍</text><text x="1735" y="772" class="xs">定位丢失</text><line x1="1685" x2="1760" y1="805" y2="805" stroke="#a8c2e8"/><text x="1722" y="835" class="s center" font-weight="700">风险等级</text><text x="1695" y="872" class="icon center">⚠️</text><text x="1735" y="874" class="xs">高风险</text><text x="1695" y="908" class="icon center">⚠️</text><text x="1735" y="910" class="xs">中风险</text>
</svg>
